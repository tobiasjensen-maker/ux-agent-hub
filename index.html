<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UX Agent Hub</title>
<style>
:root {
  --disc:#4F46E5; --del:#0891B2; --ai:#7C3AED; --val:#059669; --success:#16A34A;
  --bg:#F8FAFC; --surface:#FFFFFF; --card:#FFFFFF; --card-hover:#F1F5F9;
  --border:#E2E8F0; --text:#1E293B; --muted:#64748B; --dim:#94A3B8;
  --glow-disc:rgba(79,70,229,.08); --glow-del:rgba(8,145,178,.08);
  --glow-ai:rgba(124,58,237,.08); --glow-val:rgba(5,150,105,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;}

/* Header */
.header{padding:10px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;background:var(--bg);}
.header-top{display:flex;align-items:center;gap:10px;}
.hub-icon{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--ai),var(--disc));display:flex;align-items:center;justify-content:center;font-size:14px;color:white;}
.header h1{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.header h1 span{color:var(--ai);font-weight:800;}


/* Layout */
.layout{display:grid;grid-template-columns:260px 1fr 300px;height:calc(100vh - var(--header-h,72px));position:sticky;top:var(--header-h,72px);}
@media(max-width:1200px){.layout{grid-template-columns:260px 1fr;}.right-panel{display:none;}}
@media(max-width:900px){.layout{grid-template-columns:1fr;}.right-panel{display:none;}}

/* Agent sidebar */
.sidebar{border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;background:#FFFFFF;}
.sidebar-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:12px 20px 8px;}
.agent-btn{display:flex;align-items:center;gap:12px;width:100%;padding:12px 20px;border:none;background:none;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;border-left:3px solid transparent;}
.agent-btn:hover{background:rgba(0,0,0,.03);color:var(--text);}
.agent-btn.active{background:rgba(0,0,0,.04);color:var(--text);border-left-color:var(--ai);}
.agent-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.agent-btn-text .agent-name{font-weight:600;display:block;}
.agent-btn-text .agent-lane{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.agent-status{margin-left:auto;width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* Main content area */
.main-content{padding:28px 36px;overflow-y:auto;}

/* Agent header */
.agent-header{margin-bottom:24px;}
.agent-header-row{display:flex;align-items:center;gap:16px;margin-bottom:12px;}
.agent-header-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;}
.agent-header h2{font-size:22px;font-weight:700;}
.agent-header .agent-phase{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:.6;}
.agent-header p{color:var(--muted);font-size:14px;max-width:600px;}

/* Capabilities accordion */
.cap-accordion{margin-bottom:16px;}
.cap-toggle{display:flex;align-items:center;gap:5px;padding:4px 0;border:none;background:none;cursor:pointer;font-size:12px;font-weight:600;color:var(--dim);transition:color .15s;}
.cap-toggle:hover{color:var(--text);}
.cap-toggle .cap-arrow{font-size:10px;transition:transform .2s;}
.cap-toggle.open .cap-arrow{transform:rotate(180deg);}
.cap-grid{display:none;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin-top:6px;margin-bottom:8px;}
.cap-grid.open{display:grid;}
.cap-card{padding:12px 14px;border-radius:10px;background:rgba(0,0,0,.02);border:1px solid var(--border);font-size:13px;}
.cap-card strong{display:block;margin-bottom:2px;font-size:12px;}
.cap-card p{color:var(--muted);font-size:12px;margin:0;line-height:1.4;}

/* Action panel */
.action-panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.action-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.action-header h3{font-size:14px;font-weight:700;}
.action-header .action-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px;}
.action-body{padding:20px;}
.action-body h4{font-size:13px;font-weight:600;margin-bottom:3px;margin-top:14px;}
.action-body h4:first-child{margin-top:0;}
.action-body p{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5;}

/* Input tabs */
.input-tabs{display:flex;border-bottom:1px solid var(--border);}
.input-tab{flex:1;padding:10px 14px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;border:none;background:none;color:var(--dim);border-bottom:2px solid transparent;transition:all .15s;}
.input-tab:hover{color:var(--text);background:rgba(0,0,0,.02);}
.input-tab.active{color:var(--text);border-bottom-color:currentColor;}
.input-tab .tab-icon{display:block;font-size:18px;margin-bottom:2px;}

.input-panel{display:none;padding:20px;}
.input-panel.active{display:block;}
.input-panel h4{font-size:14px;font-weight:600;margin-bottom:4px;margin-top:14px;}
.input-panel h4:first-child{margin-top:0;}
.input-panel p{font-size:14px;color:var(--muted);margin-bottom:8px;line-height:1.5;}

/* Form elements */
textarea,input[type="url"],input[type="text"]{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:#FFFFFF;color:var(--text);font-family:inherit;font-size:13px;resize:vertical;transition:border-color .15s;}
textarea:focus,input:focus{outline:none;border-color:var(--ai);}
textarea{min-height:120px;}
.helper{font-size:11px;color:var(--dim);margin-top:4px;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--ai);color:white;}
.btn-primary:hover{filter:brightness(1.15);}
.btn-primary:disabled{background:var(--border);color:var(--dim);cursor:not-allowed;filter:none;opacity:.6;}
.btn-ghost{background:#F1F5F9;color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:#E2E8F0;color:var(--text);}

/* Template preview */
.template-preview{margin-top:10px;}
.tpl-toggle{display:flex;align-items:center;gap:5px;padding:4px 0;border:none;background:none;cursor:pointer;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;transition:color .15s;}
.tpl-toggle:hover{color:var(--muted);}
.tpl-toggle .tpl-arrow{font-size:10px;transition:transform .2s;}
.tpl-toggle.open .tpl-arrow{transform:rotate(180deg);}
.tpl-content{display:none;margin-top:4px;}
.tpl-content.open{display:block;}
.tpl-row{padding:8px 12px;border-radius:6px;border:1px solid var(--border);margin-bottom:4px;font-size:12px;background:rgba(0,0,0,.02);}
.tpl-row strong{color:var(--text);}
.tpl-row .tpl-desc{color:var(--dim);font-size:11px;margin-top:1px;}
.tpl-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px;text-transform:uppercase;vertical-align:middle;}


/* Result area */
.result-area{display:none;padding:20px;border-top:1px solid var(--border);}
.result-area.visible{display:block;}
.result-area h4{font-size:14px;font-weight:700;margin-bottom:8px;}
.result-area textarea{min-height:180px;font-family:monospace;font-size:11px;background:#F8FAFC;}

/* Info callout */
.callout{padding:12px 14px;border-radius:8px;font-size:12px;border-left:3px solid;margin:10px 0;background:rgba(0,0,0,.02);}

/* Sidebar reference */
.ref-section{padding:0 20px;margin-top:8px;}
.ref-toggle{display:flex;align-items:center;gap:6px;width:100%;padding:8px 0;border:none;background:none;color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;}
.ref-toggle:hover{color:var(--muted);}
.ref-list{display:none;padding-bottom:8px;}
.ref-list.open{display:block;}
.ref-item{padding:4px 0;font-size:12px;color:var(--muted);}
.ref-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;}

/* Right panel */
.right-panel{border-left:1px solid var(--border);background:#FFFFFF;padding:20px 0;overflow-y:auto;}
.right-panel-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:0 16px 8px;}
.accordion{border-bottom:1px solid var(--border);}
.accordion:last-child{border-bottom:none;}
.accordion-btn{display:flex;align-items:center;gap:8px;width:100%;padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--text);text-align:left;transition:background .1s;}
.accordion-btn:hover{background:rgba(0,0,0,.02);}
.accordion-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.accordion-arrow{margin-left:auto;font-size:10px;color:var(--dim);transition:transform .2s;flex-shrink:0;}
.accordion-btn.open .accordion-arrow{transform:rotate(180deg);}
.accordion-body{display:none;padding:0 16px 12px 32px;font-size:12px;color:var(--muted);line-height:1.5;}
.accordion-body.open{display:block;}
.accordion-body a{color:var(--ai);text-decoration:none;font-size:11px;font-weight:600;}
.accordion-body a:hover{text-decoration:underline;}
.right-divider{height:1px;background:var(--border);margin:12px 16px;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px;}

@media(max-width:900px){.header,.main-content{padding-left:20px;padding-right:20px;}.sidebar{border-right:none;border-bottom:1px solid var(--border);padding:8px 0;}.layout{min-height:auto;}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <div class="hub-icon">⚡</div>
    <h1>UX <span>Agent</span> Hub</h1>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR: Agent list -->
  <div class="sidebar">
    <div class="sidebar-label">Agents</div>
    <div id="agentList"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent"></div>

  <!-- RIGHT PANEL: JTBD & Propositions -->
  <div class="right-panel">
    <div class="right-panel-label" style="display:flex;align-items:center;gap:6px;">
      <span>⭐</span> Jobs to Be Done
      <a href="https://e-conomic.slite.com/app/docs/wCYzIJKe_leay1" target="_blank" style="margin-left:auto;font-size:10px;color:var(--dim);text-decoration:none;">Open ↗</a>
    </div>
    <div id="jtbdAccordions"></div>

    <div class="right-divider"></div>

    <div class="right-panel-label" style="display:flex;align-items:center;gap:6px;">
      <span>🎯</span> Propositions 2026
      <a href="https://e-conomic.slite.com/app/docs/O2Xvwt4EwAqCuR" target="_blank" style="margin-left:auto;font-size:10px;color:var(--dim);text-decoration:none;">Open ↗</a>
    </div>
    <div id="missionAccordions"></div>
  </div>

</div>

<script>
// ──────────────────── DATA ────────────────────
const jobs = [
  {name:'Collect Documents',color:'#4F46E5',id:'dUi2r6-ahwPUMj',lead:'Mikkel',
   desc:'When I\'m in e-conomic trying to bring my client\'s books up to date, I want all necessary documents to be in place, so I can avoid time-consuming back-and-forth communication and complete the bookings without interruption.'},
  {name:'Handle Bank',color:'#0891B2',id:'BE5w1numFMjCTX',lead:'Sara',
   desc:'I want to book and reconcile all postings on the bank with minimal work.'},
  {name:'Supplier Invoices',color:'#7C3AED',id:'SkWIiElP9ewIGc',lead:'Nina',
   desc:'When my client has received a supplier invoice, I want to ensure that it will be booked and paid within the due date with minimal work.'},
  {name:'Prioritise Tasks',color:'#059669',id:'2DOFTEvXDC1SEw',lead:'Emma',
   desc:'I want to easily identify which client to focus on first and drill down into each client\'s details so I can prioritize the most important tasks and never miss a deadline.'},
  {name:'Overview & Control',color:'#D97706',id:'qwDq5Cx62XC-zn',lead:'Carl',
   desc:'I want to summarize relevant bookkeeping data so I can finally finish and reconcile all balance accounts. If I find errors, I want it to be easy to correct them.'},
  {name:'Advice About Anomalies',color:'#DC2626',id:'RWUjegEtUuo8Us',lead:'—',
   desc:'When something unusual happens in my client\'s accounting, I want to be aware of it right away so I can research, handle, and guide them before it negatively impacts their business.'},
  {name:'Handle Payroll',color:'#2563EB',id:'tPdLJMxaoJWXuh',lead:'Lærke/Olivia',
   desc:'I want to handle payroll for my clients efficiently and accurately.'},
  {name:'Period Closing',color:'#9333EA',id:'rZ_CET2TfnVQWG',lead:'Sara',
   desc:'When making period closings, I want to summarize relevant bookkeeping data so I can finally finish and reconcile all balance accounts. If I find errors, I want it to be easy to correct them.'},
  {name:'Business Advisory',color:'#0D9488',id:'i8PLvYpiRiULoA',lead:'Carl',
   desc:'I want to advise my clients about how they should manage their business more efficiently, stay compliant and implement digital workflows.'},
  {name:'Simple accounting on Mobile',color:'#EA580C',id:'wKpP-8piqqSvlX',lead:'Dany',
   desc:'When I\'m away from my desk, I want to stay on top of urgent client matters and approve time-sensitive actions — so nothing is delayed just because I\'m not at my computer.'},
  {name:'Trusted Platform',color:'#64748B',id:'Lh-_Tgbl6BDDaZ',lead:'Daniele',
   desc:'I want to trust that the platform I rely on every day is secure, reliable, and compliant — so I can focus on my clients without worrying about data loss, downtime, or regulatory risk.'}
];
const missions = [
  {name:'Automation',icon:'⚙️',color:'#0891B2',id:'rL_YP9jes6qVnH',
   desc:'Embed AI-powered automation and smart defaults into core bookkeeping JTBD — from document collection and bank handling through supplier invoices, payroll, and period closing. The engine of efficiency for mass-market AOs.',
   outcome:'Save AOs 50% of time spent on core bookkeeping tasks.',
   jobs:'Collect Documents, Handle Bank, Supplier Invoices, Prioritise Tasks, Overview & Control, Handle Payroll, Period Closing'},
  {name:'Advisory',icon:'🧠',color:'#7C3AED',id:'ADlV1t-Po9Ie1o',
   desc:'Transform accountants from bookkeepers into trusted advisors. Surface anomalies proactively and equip AOs with insights and tools to guide their clients on compliance, efficiency, and business strategy.',
   outcome:'Accountants recognised as strategic advisors, not just bookkeepers.',
   jobs:'Advice About Anomalies, Business Advisory'},
  {name:'Platform & Partners',icon:'🤝',color:'#059669',id:'7M-oAAd97Ny9Hd',
   desc:'Strengthen the platform foundation — APIs, security, compliance, mobile — and grow through partnerships. Ensure e-conomic remains the most trusted solution in an agentic future while enabling new integrations and ecosystems.',
   outcome:'Trusted, secure, and extensible platform supporting all propositions.',
   jobs:'Simple accounting on Mobile, Trusted Platform'}
];

const agents = [
  {
    id:'discover', num:'01', name:'Discovery Agent', icon:'🔍',
    lane:'Discovery', laneColor:'var(--disc)', bgGlow:'var(--glow-disc)',
    tagline:'Creates discovery items in your backlog — choose a JTBD, describe your research question, and the agent adds it to the <a href="https://e-conomic.slite.com/app/docs/MFcG0JEQAzh2cI" target="_blank" style="color:var(--ai);text-decoration:none;font-weight:600;">All Discovery collection</a>',
    capabilities:[
      {title:'JTBD Selection',desc:'Pick from your 11 Jobs to Be Done to scope the research area'},
      {title:'Research Scoping',desc:'Define what you want to learn — the agent structures it as a discovery item'},
      {title:'Method Suggestion',desc:'Recommends a research method (interview, diary study, data analysis, usability test, survey)'},
      {title:'Backlog Creation',desc:'Adds the item to All Discovery in Slite with Job, Method, Status, and Owner'}
    ],
    inputType:'discover'
  },
  {
    id:'opportunity', num:'02', name:'Opportunity Agent', icon:'💡',
    lane:'Discovery', laneColor:'var(--disc)', bgGlow:'var(--glow-disc)',
    tagline:'Evaluates research inputs against your JTBD framework and missions to create validated opportunities',
    capabilities:[
      {title:'Research Analysis',desc:'Parse interview transcripts and research notes to extract customer needs, pain points, and jobs'},
      {title:'JTBD Mapping',desc:'Map insights to your 11 Jobs to Be Done with confidence scoring'},
      {title:'Mission Alignment',desc:'Assess strategic fit against 2026 missions'},
      {title:'Opportunity Creation',desc:'Draft and push validated opportunities to your Slite backlog'}
    ],
    inputType:'opportunity'
  },
  {
    id:'pitch', num:'03', name:'Pitch Agent', icon:'📋',
    lane:'Delivery', laneColor:'var(--del)', bgGlow:'var(--glow-del)',
    tagline:'Generates delivery pitches from validated opportunities using your Pitch Template v3.0',
    capabilities:[
      {title:'Opportunity Reading',desc:'Pull full context from your Slite opportunity backlog'},
      {title:'Pitch Generation',desc:'Fill all 5 template sections: Problem, Value, Evidence, Success, Sizing'},
      {title:'Slite Integration',desc:'Save to Pitches collection with status "Up for review" and metadata'},
      {title:'Chain Tracing',desc:'Links back to original JTBD and mission for full context'}
    ],
    inputType:'pitch'
  },
  {
    id:'brief', num:'04', name:'Brief Agent', icon:'✏️',
    lane:'AI + Design System', laneColor:'var(--ai)', bgGlow:'var(--glow-ai)',
    tagline:'Creates Design Brief 2.1 from pitch + opportunity, scoping the problem and preparing LLM context',
    capabilities:[
      {title:'Full Chain Reading',desc:'Trace pitch → opportunity → job → mission for complete context'},
      {title:'Brief Generation',desc:'Fill Design Brief 2.1 template: Foundations, Core Problem, JTBD, Journey, Behavior Shift, Risks, Outcomes, Scope'},
      {title:'Gap Flagging',desc:'Mark sections needing your input with [NEEDS INPUT]'},
      {title:'LLM Context Prep',desc:'Structure the brief to double as AI generation prompt'}
    ],
    inputType:'brief'
  },
  {
    id:'design', num:'05', name:'Design Agent', icon:'🤖',
    lane:'AI + Design System', laneColor:'var(--ai)', bgGlow:'var(--glow-ai)',
    tagline:'Generates solution proposals using the Taco Web Components design system as structured context',
    capabilities:[
      {title:'Design System Awareness',desc:'Knows every Taco component, variant, token, and layout rule'},
      {title:'Multi-Solution Generation',desc:'Produces multiple alternatives varying on key dimensions'},
      {title:'Figma Integration',desc:'Can create wireframe-level designs via Figma MCP'},
      {title:'Code-Ready Output',desc:'References Storybook-available components for near-instant handoff'}
    ],
    inputType:'design'
  },
  {
    id:'validate', num:'06', name:'Validation Agent', icon:'🧪',
    lane:'Validation', laneColor:'var(--val)', bgGlow:'var(--glow-val)',
    tagline:'Helps structure customer validation — test design, participant selection, and feedback capture',
    capabilities:[
      {title:'Test Plan Generation',desc:'Create usability test scripts, concept test guides, or preference tests'},
      {title:'Participant Criteria',desc:'Define screening criteria based on JTBD user segments'},
      {title:'Feedback Structuring',desc:'Template for capturing what works, what doesn\'t, and why'},
      {title:'Evidence Synthesis',desc:'Consolidate findings into actionable design decisions'}
    ],
    inputType:'validate'
  },
  {
    id:'iterate', num:'07', name:'Iteration Agent', icon:'🔄',
    lane:'AI + Design System', laneColor:'var(--ai)', bgGlow:'var(--glow-ai)',
    tagline:'Feeds validation learnings back into the design brief and regenerates refined solutions',
    capabilities:[
      {title:'Feedback Integration',desc:'Structure customer feedback as new constraints and revised criteria'},
      {title:'Brief Update',desc:'Patch the design brief with validation learnings'},
      {title:'Regeneration',desc:'Ask Design Agent to produce updated solutions incorporating feedback'},
      {title:'Comparison',desc:'Evaluate new vs. previous solutions against evidence'}
    ],
    inputType:'iterate'
  },
  {
    id:'solution', num:'08', name:'Solution Agent', icon:'✅',
    lane:'Delivery', laneColor:'var(--del)', bgGlow:'var(--glow-del)',
    tagline:'Packages the validated solution into a delivery-ready specification with component mappings',
    capabilities:[
      {title:'Spec Generation',desc:'Create interaction specs: states, transitions, error handling, edge cases'},
      {title:'Component Mapping',desc:'Map to exact Taco Web Components with variant properties'},
      {title:'Token Documentation',desc:'List all color, typography, and spacing tokens applied'},
      {title:'Validation Summary',desc:'Attach customer testing evidence and confidence scores'}
    ],
    inputType:'solution'
  }
];

let currentAgent = 0;

// ──────────────────── RENDER ────────────────────
function renderSidebar() {
  const el = document.getElementById('agentList');
  el.innerHTML = agents.map((a,i) => `
    <button class="agent-btn ${i===currentAgent?'active':''}" onclick="selectAgent(${i})" style="${i===currentAgent?'border-left-color:'+a.laneColor:''}">
      <div class="agent-icon" style="background:${a.bgGlow}">${a.icon}</div>
      <div class="agent-btn-text">
        <span class="agent-name">${a.name}</span>
        <span class="agent-lane" style="color:${a.laneColor}">${a.lane}</span>
      </div>
    </button>
  `).join('');
}

function renderAccordions() {
  document.getElementById('jtbdAccordions').innerHTML = jobs.map((j,i) => `
    <div class="accordion">
      <button class="accordion-btn" onclick="toggleAccordion(this)">
        <span class="accordion-dot" style="background:${j.color}"></span>
        ${j.name}
        <span class="accordion-arrow">▾</span>
      </button>
      <div class="accordion-body">
        <p style="margin-bottom:6px;font-style:italic;">"${j.desc}"</p>
        <p style="font-size:11px;color:var(--dim);margin-bottom:4px;">Discovery lead: ${j.lead}</p>
        <a href="https://e-conomic.slite.com/app/docs/${j.id}" target="_blank">View in Slite ↗</a>
      </div>
    </div>
  `).join('');

  document.getElementById('missionAccordions').innerHTML = missions.map(m => `
    <div class="accordion">
      <button class="accordion-btn" onclick="toggleAccordion(this)">
        <span style="font-size:14px;flex-shrink:0;">${m.icon}</span>
        ${m.name}
        <span class="accordion-arrow">▾</span>
      </button>
      <div class="accordion-body">
        <p style="margin-bottom:6px;">${m.desc}</p>
        <p style="font-size:11px;color:var(--dim);margin-bottom:4px;"><strong>Outcome:</strong> ${m.outcome}</p>
        <p style="font-size:11px;color:var(--dim);margin-bottom:4px;"><strong>JTBD:</strong> ${m.jobs}</p>
        <a href="https://e-conomic.slite.com/app/docs/${m.id}" target="_blank">View in Slite ↗</a>
      </div>
    </div>
  `).join('');

function getTime() { return new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function extractId(url) { const m=url.match(/docs\/([a-zA-Z0-9_-]+)/); return m?m[1]:url; }

// Track the Claude popup window so we can reuse it
let claudePopup = null;
const POPUP_W = 560, POPUP_H = 700;

function showResult(agentId, prompt) {
  const area = document.getElementById('resultArea-'+agentId);
  area.classList.add('visible');
  area.innerHTML = `
    <h4 style="color:var(--success);">✅ Agent Deployed</h4>
    <p style="font-size:12px;color:var(--dim);margin-bottom:8px;">Claude opened in a popup window with your prompt. Check it and hit send.</p>
    <details style="margin-top:4px;">
      <summary style="font-size:12px;color:var(--muted);cursor:pointer;">View generated prompt</summary>
      <textarea id="prompt-${agentId}" readonly style="margin-top:6px;">${prompt}</textarea>
      <div style="margin-top:6px;display:flex;gap:8px;">
        <button class="btn btn-ghost" style="font-size:12px;" onclick="openClaudePopup('prompt-${agentId}',this)">🔄 Re-open in Claude</button>
        <button class="btn btn-ghost" style="font-size:12px;" onclick="copyOnly('prompt-${agentId}',this)">📋 Copy</button>
      </div>
    </details>
  `;
  // Auto-launch Claude popup
  launchClaudeWithPrompt(prompt);
}
function launchClaudeWithPrompt(prompt) {
  // Copy to clipboard as backup
  navigator.clipboard.writeText(prompt).catch(()=>{});
  // Calculate popup position: right side of screen, vertically centered
  const left = window.screenX + window.outerWidth - POPUP_W - 40;
  const top = window.screenY + Math.round((window.outerHeight - POPUP_H) / 2);
  const features = `width=${POPUP_W},height=${POPUP_H},left=${left},top=${top},resizable=yes,scrollbars=yes,status=no,toolbar=no,menubar=no,location=yes`;
  const encoded = encodeURIComponent(prompt);
  const url = 'https://claude.ai/new?q=' + encoded;
  // Open (or reuse) the popup
  claudePopup = window.open(url, 'claude_agent_popup', features);
  if(claudePopup) claudePopup.focus();
}
function openClaudePopup(id, btn) {
  const prompt = document.getElementById(id).value;
  launchClaudeWithPrompt(prompt);
  btn.textContent='✅ Opened!';setTimeout(()=>{btn.innerHTML='🔄 Re-open in Claude';},2000);
}
function copyOnly(id, btn) {
  const prompt = document.getElementById(id).value;
  navigator.clipboard.writeText(prompt).then(()=>{
    btn.textContent='✓ Copied!';setTimeout(()=>{btn.textContent='📋 Copy';},2000);
  }).catch(()=>{
    document.getElementById(id).select();document.execCommand('copy');
    btn.textContent='✓ Copied!';setTimeout(()=>{btn.textContent='📋 Copy';},2000);
  });
}

   **AUTOMATION** (Jobs: Collect Documents, Handle Bank, Supplier Invoices, Prioritise Tasks, Overview & Control, Handle Payroll, Period Closing)

   Design principles:
   - Present insights, not just data — the AO should see the story, not a spreadsheet
   - Design for the AO-to-client conversation: outputs should be shareable, explainable, and professional
   - Use progressive disclosure — lead with the headline, let them drill into evidence
   - Build trust through transparency: show reasoning, sources, and confidence behind every recommendation
   - Support the AO's expertise, don't replace it — frame AI suggestions as "here's what I noticed" not "here's what to do"
   - Enable the AO to add their professional judgement before presenting to clients
   - North Star: WAU (Freemium → Paid conversion %) — designs should make advisory feel valuable and worth paying for

   **PLATFORM/PARTNERS** (Jobs: Simple accounting on Mobile, Trusted Platform)
   Design principles:
   - Reliability and trust are the primary UX — every element should communicate stability and security
   - Mobile: design for triage and quick actions, not full workflows — the desk is where deep work happens
   - Platform: make the invisible visible — uptime, data integrity, compliance status should be glanceable
   - Extensibility: design patterns that third parties can build on without breaking consistency
   - Progressive trust: let AOs verify before they rely — show audit trails, calculation breakdowns, change logs
   - Respect that AOs stake their professional reputation on this platform
   - North Star: 3rd Party Agents in Marketplace (ecosystem ARR) — design for an ecosystem, not just a product

4. Using the brief + proposition principles as context, generate a **coded HTML prototype** for each solution.

   **OUTPUT FORMAT: Single-file HTML prototype**
   Each solution must be a working, interactive HTML file that the UX designer can open in a browser.

   **Taco Web Components — use these exact elements:**
   - \`<adesy-button appearance="primary|default|ghost|discrete|danger">\` — Buttons (add \`icon-left\` or \`icon-right\` attribute for icons, \`disabled\` for disabled state)
   - \`<adesy-icon-button appearance="primary|default|ghost|discrete|danger">\` — Icon-only buttons (32×32)
   - \`<adesy-input-field label="..." placeholder="...">\` — Text inputs (280–320px short, 400–600px long, 600–720px max)
   - \`<adesy-text-area label="..." placeholder="...">\` — Multi-line text input
   - \`<adesy-dropdown label="...">\` with \`<adesy-option>\` children — Select dropdowns
   - \`<adesy-radio-button-group>\` with \`<adesy-radio-button>\` — Radio selections
   - \`<adesy-toggle>\` — On/off switch (Figma only — note in comments)
   - \`<adesy-data-table>\` with \`<adesy-column>\` and row data — Full data tables with sorting, selection
   - \`<adesy-table-bulk-action-bar>\` — Floating action bar for selected table rows
   - \`<adesy-tag appearance="..." label="...">\` — Status tags, labels, chips
   - \`<adesy-tabs>\` with \`<adesy-tab>\` children — Tab navigation
   - \`<adesy-topbar-navigation>\` — Top app navigation bar
   - \`<adesy-pagination>\` — Page navigation for tables
   - \`<adesy-accordion-group>\` with \`<adesy-accordion>\` — Collapsible sections
   - \`<adesy-card>\` — Content container cards (left-aligned CTAs only)
   - \`<adesy-menu-button>\` — Button with dropdown menu
   - \`<adesy-avatar>\` — User avatar (image or initials)
   - \`<adesy-donut-chart>\` — Proportional data chart
   - \`<adesy-column-filter>\` — Column filter popover for tables
   - \`<adesy-divider>\` — Horizontal section separator

   **Design tokens (CSS custom properties):**
   - Colors: \`--color-button-surface-primary\`, \`--color-button-surface-hover\`, \`--color-button-surface-tertiary\`
   - Use the Taco token naming pattern \`--color/{category}/{property}\`
   - Typography: \`--font-size-interactive-button-s\`, \`--font-size-interactive-button-xs\`

   **Layout rules:**
   - Without sidebar: use CSS grid matching Screen Grid Layout (max-width breakpoints)
   - With sidebar: use CSS grid matching Screen + Sidebar Grid Layout
   - Page layout spacing must follow the Web Components Grid system

   **Prototype requirements:**
   - Self-contained single HTML file (inline CSS + JS)
   - Use Web Component tag names as specified above (even if not registered — they render as custom elements and show intent)
   - Include realistic sample data that matches the JTBD context (real-looking AO names, client names, Danish accounting terms)
   - Make interactions work: tabs switch, accordions expand, buttons show hover states, tables can sort
   - Add CSS that approximates the Taco design tokens (neutral greys, blue primary, clean sans-serif typography)
   - Comment each section with which proposition principle it addresses
   - Include a header comment block listing: JTBD, Proposition, Key principles applied

   **Do NOT:**
   - Use VUD components (deprecated)
   - Use components prefixed with \`🧩 BASE BLOCKS_\`
   - Use Toggle or multi-select Dropdown in production (Figma only — flag in comments)

5. Generate 2-3 alternative solutions as separate HTML files, varying on key dimensions from the brief
6. For each solution: include an inline comment block explaining layout decisions, component choices, interaction flow, and how it addresses the core problem through the lens of its proposition
7. If Figma MCP is available, also offer to create the design in Figma using the exact component keys from the design system
8. Present solutions for review, noting how each scores against the relevant North Star metric
9. Save each prototype as a separate HTML file so the designer can open, review, and share them`;
  showResult('design',prompt);
}

const inputRules = {
  discover:    {btn:'btn-discover',    required:[{id:'inp-discover-job',type:'select'},{id:'inp-discover-text',type:'text'}]},
  opportunity: {btn:'btn-opportunity', required:[{id:'inp-doc',type:'text'}]},
  pitch:       {btn:'btn-pitch',       required:[{id:'inp-pitch-url',type:'text'}]},
  brief:       {btn:'btn-brief',       required:[{id:'inp-brief-url',type:'text'}]},
  design:      {btn:'btn-design',      required:[{id:'inp-design-url',type:'text'}]},
  validate:    {btn:'btn-validate',    required:[{id:'inp-validate-text',type:'text'}]},
  iterate:     {btn:'btn-iterate',     required:[{id:'inp-iterate-text',type:'text'}]},
  solution:    {btn:'btn-solution',    required:[{id:'inp-solution-url',type:'text'}]}
};

function bindInputValidation() {
  const agent = agents[currentAgent];
  const rule = inputRules[agent.id];
  if(!rule) return;
  const btn = document.getElementById(rule.btn);
  if(!btn) return;

  function check() {
    const allFilled = rule.required.every(r => {
      const el = document.getElementById(r.id);
      return el && el.value.trim() !== '';
    });
    btn.disabled = !allFilled;
  }

  rule.required.forEach(r => {
    const el = document.getElementById(r.id);
    if(el) el.addEventListener('input', check);
    if(el && el.tagName === 'SELECT') el.addEventListener('change', check);
  });

  check();
}
